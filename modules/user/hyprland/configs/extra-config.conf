monitor=HDMI-A-1,1920x1080@60,0x0,1
monitor=DP-1,1920x1080@60,-1080x0,1,transform,1

# Window mode: $mod+W to enter, then $mod+r=resize, m=move, n=nudge, s=swap, g=goto
bind = $mod, W, exec, notify-send -u low -t 1500 -a hypr "window"
bind = $mod, W, submap, window
submap = window
bind = $mod, slash, exec, hypr-help window
bind = $mod, r, exec, notify-send -u low -t 1500 -a hypr "resize"
bind = $mod, r, submap, resize
bind = $mod, m, exec, notify-send -u low -t 1500 -a hypr "move"
bind = $mod, m, submap, move
bind = $mod, n, exec, notify-send -u low -t 1500 -a hypr "nudge"
bind = $mod, n, submap, nudge
bind = $mod, s, exec, notify-send -u low -t 1500 -a hypr "swap"
bind = $mod, s, submap, swap
bind = $mod, g, exec, notify-send -u low -t 1500 -a hypr "goto"
bind = $mod, g, submap, wingo
bind = $mod, f, fullscreen
bind = $mod, t, togglefloating
bind = $mod, c, centerwindow
bind = $mod, p, pin
bind = $mod, q, killactive
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Window-swap mode: swap with direction or next/prev in layout
submap = swap
bind = $mod, slash, exec, hypr-help swap
bind = $mod, h, swapwindow, l
bind = $mod, l, swapwindow, r
bind = $mod, k, swapwindow, u
bind = $mod, j, swapwindow, d
bind = $mod, n, layoutmsg, swapnext
bind = $mod, p, layoutmsg, swapprev
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Window-goto mode: move focus in direction
submap = wingo
bind = $mod, slash, exec, hypr-help wingo
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Nudge mode: floating window pixel movement, SPACE/ESC to exit
submap = nudge
bind = $mod, slash, exec, hypr-help nudge
bind = $mod, h, moveactive, -20 0
bind = $mod, l, moveactive, 20 0
bind = $mod, k, moveactive, 0 -20
bind = $mod, j, moveactive, 0 20
bind = $mod SHIFT, h, moveactive, -100 0
bind = $mod SHIFT, l, moveactive, 100 0
bind = $mod SHIFT, k, moveactive, 0 -100
bind = $mod SHIFT, j, moveactive, 0 100
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Resize mode: tap HJKL repeatedly, SPACE/ESC to exit
submap = resize
bind = $mod, slash, exec, hypr-help resize
bind = $mod, h, resizeactive, -20 0
bind = $mod, l, resizeactive, 20 0
bind = $mod, k, resizeactive, 0 -20
bind = $mod, j, resizeactive, 0 20
bind = $mod SHIFT, h, resizeactive, -100 0
bind = $mod SHIFT, l, resizeactive, 100 0
bind = $mod SHIFT, k, resizeactive, 0 -100
bind = $mod SHIFT, j, resizeactive, 0 100
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Move mode: HJKL moves window, numbers move to workspace, SPACE/ESC to exit
submap = move
bind = $mod, slash, exec, hypr-help move
bind = $mod, h, movewindow, l
bind = $mod, l, movewindow, r
bind = $mod, k, movewindow, u
bind = $mod, j, movewindow, d
bind = $mod, 1, movetoworkspacesilent, 1
bind = $mod, 2, movetoworkspacesilent, 2
bind = $mod, 3, movetoworkspacesilent, 3
bind = $mod, 4, movetoworkspacesilent, 4
bind = $mod, 5, movetoworkspacesilent, 5
bind = $mod, 6, movetoworkspacesilent, 6
bind = $mod, 7, movetoworkspacesilent, 7
bind = $mod, 8, movetoworkspacesilent, 8
bind = $mod, 9, movetoworkspacesilent, 9
bind = $mod, 0, movetoworkspacesilent, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Workspace mode: $mod+E to enter, numbers=send window silent, SHIFT+numbers=send+follow, SPACE/ESC to exit
bind = $mod, E, exec, notify-send -u low -t 1500 -a hypr "workspace"
bind = $mod, E, submap, workspace
submap = workspace
bind = $mod, slash, exec, hypr-help workspace
bind = $mod, 1, movetoworkspacesilent, 1
bind = $mod, 2, movetoworkspacesilent, 2
bind = $mod, 3, movetoworkspacesilent, 3
bind = $mod, 4, movetoworkspacesilent, 4
bind = $mod, 5, movetoworkspacesilent, 5
bind = $mod, 6, movetoworkspacesilent, 6
bind = $mod, 7, movetoworkspacesilent, 7
bind = $mod, 8, movetoworkspacesilent, 8
bind = $mod, 9, movetoworkspacesilent, 9
bind = $mod, 0, movetoworkspacesilent, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod SHIFT, h, movetoworkspacesilent, m-1
bind = $mod SHIFT, l, movetoworkspacesilent, m+1
bind = $mod, g, exec, notify-send -u low -t 1500 -a hypr "ws-goto"
bind = $mod, g, submap, wspgo
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Workspace-goto mode: cycle workspaces with h/l or jump by number
submap = wspgo
bind = $mod, slash, exec, hypr-help wspgo
bind = $mod, h, workspace, m-1
bind = $mod, l, workspace, m+1
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Layout mode: $mod+L to enter, d=dwindle m=master, SPACE/ESC to exit
bind = $mod, L, exec, notify-send -u low -t 1500 -a hypr "layout"
bind = $mod, L, submap, layout
submap = layout
bind = $mod, slash, exec, hypr-help layout
bind = $mod, d, exec, hyprctl keyword general:layout dwindle
bind = $mod, d, submap, reset
bind = $mod, m, exec, hyprctl keyword general:layout master
bind = $mod, m, submap, reset
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Screenshot mode: $mod+S to enter, a=area w=active s=screen, SPACE/ESC to exit
bind = $mod, S, exec, notify-send -u low -t 1500 -a hypr "screenshot"
bind = $mod, S, submap, screenshot
submap = screenshot
bind = $mod, slash, exec, hypr-help screenshot
bind = $mod, a, exec, grimblast --notify copysave area
bind = $mod, a, submap, reset
bind = $mod, w, exec, grimblast --notify --cursor copysave active
bind = $mod, w, submap, reset
bind = $mod, s, exec, grimblast --notify --cursor copysave screen
bind = $mod, s, submap, reset
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Launch mode: $mod+P to enter, q=brave w=yazi e=pulsemixer r=nvim a=obsidian s=readest
bind = $mod, P, exec, notify-send -u low -t 1500 -a hypr "launch"
bind = $mod, P, submap, launch
submap = launch
bind = $mod, slash, exec, hypr-help launch
bind = $mod, q, exec, brave
bind = $mod, q, submap, reset
bind = $mod, w, exec, kitty -e yazi
bind = $mod, w, submap, reset
bind = $mod, e, exec, kitty -e pulsemixer
bind = $mod, e, submap, reset
bind = $mod, r, exec, kitty -e nvim
bind = $mod, r, submap, reset
bind = $mod, a, exec, obsidian
bind = $mod, a, submap, reset
bind = $mod, s, exec, readest
bind = $mod, s, submap, reset
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

plugin {
  hyprfocus {
    enabled = yes
    focus_animation = shrink
    animate_floating = yes
    animate_workspacechange = yes
    shrink {
      shrink_percentage = 0.99
      in_bezier = 0.5 0 1 1
      in_speed = 2
      out_bezier = 0.5 0 1 1
      out_speed = 2
    }
  }
}
