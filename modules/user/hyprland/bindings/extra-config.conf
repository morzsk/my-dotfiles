monitor=HDMI-A-1,1920x1080@60,0x0,1
monitor=DP-1,1920x1080@60,-1080x0,1,transform,1

# Window mode: $mod+W to enter, then r=resize, m=move, n=nudge, s=swap, g=goto
bind = $mod, W, submap, window
submap = window
bind = $mod, slash, exec, hypr-help window
bind = , r, submap, resize
bind = , m, submap, move
bind = , n, submap, nudge
bind = , s, submap, swap
bind = , g, submap, wingo
bind = , f, fullscreen
bind = , t, togglefloating
bind = , c, centerwindow
bind = , p, pin
bind = , q, killactive
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Window-swap mode: swap with direction or next/prev in layout
submap = swap
bind = $mod, slash, exec, hypr-help swap
bind = , h, swapwindow, l
bind = , l, swapwindow, r
bind = , k, swapwindow, u
bind = , j, swapwindow, d
bind = , n, layoutmsg, swapnext
bind = , p, layoutmsg, swapprev
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Window-goto mode: move focus in direction
submap = wingo
bind = $mod, slash, exec, hypr-help wingo
bind = , h, movefocus, l
bind = , l, movefocus, r
bind = , k, movefocus, u
bind = , j, movefocus, d
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Nudge mode: floating window pixel movement, SPACE/ESC to exit
submap = nudge
bind = $mod, slash, exec, hypr-help nudge
bind = , h, moveactive, -20 0
bind = , l, moveactive, 20 0
bind = , k, moveactive, 0 -20
bind = , j, moveactive, 0 20
bind = SHIFT, h, moveactive, -100 0
bind = SHIFT, l, moveactive, 100 0
bind = SHIFT, k, moveactive, 0 -100
bind = SHIFT, j, moveactive, 0 100
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Resize mode: tap HJKL repeatedly, SPACE/ESC to exit
submap = resize
bind = $mod, slash, exec, hypr-help resize
bind = , h, resizeactive, -20 0
bind = , l, resizeactive, 20 0
bind = , k, resizeactive, 0 -20
bind = , j, resizeactive, 0 20
bind = SHIFT, h, resizeactive, -100 0
bind = SHIFT, l, resizeactive, 100 0
bind = SHIFT, k, resizeactive, 0 -100
bind = SHIFT, j, resizeactive, 0 100
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Move mode: HJKL moves window, numbers move to workspace, SPACE/ESC to exit
submap = move
bind = $mod, slash, exec, hypr-help move
bind = , h, movewindow, l
bind = , l, movewindow, r
bind = , k, movewindow, u
bind = , j, movewindow, d
bind = , 1, movetoworkspacesilent, 1
bind = , 2, movetoworkspacesilent, 2
bind = , 3, movetoworkspacesilent, 3
bind = , 4, movetoworkspacesilent, 4
bind = , 5, movetoworkspacesilent, 5
bind = , 6, movetoworkspacesilent, 6
bind = , 7, movetoworkspacesilent, 7
bind = , 8, movetoworkspacesilent, 8
bind = , 9, movetoworkspacesilent, 9
bind = , 0, movetoworkspacesilent, 10
bind = SHIFT, 1, movetoworkspace, 1
bind = SHIFT, 2, movetoworkspace, 2
bind = SHIFT, 3, movetoworkspace, 3
bind = SHIFT, 4, movetoworkspace, 4
bind = SHIFT, 5, movetoworkspace, 5
bind = SHIFT, 6, movetoworkspace, 6
bind = SHIFT, 7, movetoworkspace, 7
bind = SHIFT, 8, movetoworkspace, 8
bind = SHIFT, 9, movetoworkspace, 9
bind = SHIFT, 0, movetoworkspace, 10
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Workspace mode: $mod+E to enter, SHIFT+numbers=send window, h/l=cycle, SPACE/ESC to exit
bind = $mod, E, submap, workspace
submap = workspace
bind = $mod, slash, exec, hypr-help workspace
bind = SHIFT, 1, movetoworkspacesilent, 1
bind = SHIFT, 2, movetoworkspacesilent, 2
bind = SHIFT, 3, movetoworkspacesilent, 3
bind = SHIFT, 4, movetoworkspacesilent, 4
bind = SHIFT, 5, movetoworkspacesilent, 5
bind = SHIFT, 6, movetoworkspacesilent, 6
bind = SHIFT, 7, movetoworkspacesilent, 7
bind = SHIFT, 8, movetoworkspacesilent, 8
bind = SHIFT, 9, movetoworkspacesilent, 9
bind = SHIFT, 0, movetoworkspacesilent, 10
bind = SHIFT, h, movetoworkspacesilent, m-1
bind = SHIFT, l, movetoworkspacesilent, m+1
bind = , g, submap, wspgo
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Workspace-goto mode: cycle workspaces with h/l or jump by number
submap = wspgo
bind = $mod, slash, exec, hypr-help wspgo
bind = , h, workspace, m-1
bind = , l, workspace, m+1
bind = , 1, workspace, 1
bind = , 2, workspace, 2
bind = , 3, workspace, 3
bind = , 4, workspace, 4
bind = , 5, workspace, 5
bind = , 6, workspace, 6
bind = , 7, workspace, 7
bind = , 8, workspace, 8
bind = , 9, workspace, 9
bind = , 0, workspace, 10
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Layout mode: $mod+L to enter, d=dwindle m=master, SPACE/ESC to exit
bind = $mod, L, submap, layout
submap = layout
bind = $mod, slash, exec, hypr-help layout
bind = , d, exec, hyprctl keyword general:layout dwindle
bind = , d, submap, reset
bind = , m, exec, hyprctl keyword general:layout master
bind = , m, submap, reset
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Screenshot mode: $mod+S to enter, a=area w=active s=screen, SPACE/ESC to exit
bind = $mod, S, submap, screenshot
submap = screenshot
bind = $mod, slash, exec, hypr-help screenshot
bind = , a, exec, grimblast copysave area
bind = , a, submap, reset
bind = , w, exec, grimblast --cursor copysave active
bind = , w, submap, reset
bind = , s, exec, grimblast --cursor copysave screen
bind = , s, submap, reset
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

# Launch mode: $mod+P to enter, q=brave w=yazi e=pulsemixer r=nvim a=obsidian s=readest
bind = $mod, P, submap, launch
submap = launch
bind = $mod, slash, exec, hypr-help launch
bind = , q, exec, brave
bind = , q, submap, reset
bind = , w, exec, kitty -e yazi
bind = , w, submap, reset
bind = , e, exec, kitty -e pulsemixer
bind = , e, submap, reset
bind = , r, exec, kitty -e nvim
bind = , r, submap, reset
bind = , a, exec, obsidian
bind = , a, submap, reset
bind = , s, exec, readest
bind = , s, submap, reset
bind = , space, submap, reset
bind = , escape, submap, reset
submap = reset

plugin {
  hyprfocus {
    enabled = yes
    focus_animation = shrink
    animate_floating = yes
    animate_workspacechange = yes
    shrink {
      shrink_percentage = 0.99
      in_bezier = 0.5 0 1 1
      in_speed = 2
      out_bezier = 0.5 0 1 1
      out_speed = 2
    }
  }
}
